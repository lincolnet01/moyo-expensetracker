name: Build and Deploy

on:
  push:
    branches: [master]

env:
  SERVER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/expensetracker-server
  CLIENT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/expensetracker-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
            ${{ env.CLIENT_IMAGE }}:latest
          build-args: |
            API_URL=http://server:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update GitOps Repo
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: lincolnet01/claude-devops
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}

      - name: Update image tags
        run: |
          sed -i "s|image: lincolndel/expensetracker-server:.*|image: lincolndel/expensetracker-server:${{ github.sha }}|" apps/expensetracker/server-deployment.yaml
          sed -i "s|image: lincolndel/expensetracker-client:.*|image: lincolndel/expensetracker-client:${{ github.sha }}|" apps/expensetracker/client-deployment.yaml
          echo "Updated image tags to ${{ github.sha }}"
          grep "image:" apps/expensetracker/server-deployment.yaml apps/expensetracker/client-deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/expensetracker/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy(expensetracker): update images to ${{ github.sha }}"
          git push

      - name: Deployment summary
        run: |
          echo "============================================"
          echo "  EXPENSE TRACKER - GITOPS UPDATE"
          echo "============================================"
          echo ""
          echo "  Server: ${{ env.SERVER_IMAGE }}:${{ github.sha }}"
          echo "  Client: ${{ env.CLIENT_IMAGE }}:${{ github.sha }}"
          echo "  GitOps repo updated - ArgoCD will sync automatically"
          echo ""
          echo "============================================"
